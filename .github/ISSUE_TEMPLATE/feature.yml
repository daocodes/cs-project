name: Feature
description: New user-facing or agent capability
title: "[area] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        New capability. Branch: `feature/<issue#>-<slug>`
        Title prefix: `[frontend]`, `[backend]`, `[ml]`, `[infra]`, or `[agent]`.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:frontend
        - area:backend
        - area:ml
        - area:infra
        - area:agent
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:P0
        - priority:P1
        - priority:P2
        - priority:P3
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      description: Leave unset for backlog issues
      options:
        - sprint:0
        - sprint:1
        - sprint:2
        - sprint:3
        - "(backlog — no sprint label)"

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Implement kanban CRUD API per API contract...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
