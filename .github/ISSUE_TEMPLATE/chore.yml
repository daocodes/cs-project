name: Chore
description: Tooling, docs, setup, CI, or time-boxed research
title: "[area] "
labels: ["type:chore"]
body:
  - type: markdown
    attributes:
      value: |
        Non-feature work: CI, deps, docs, repo setup, or short research.
        Branch: `chore/<issue#>-<slug>`

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:frontend
        - area:backend
        - area:ml
        - area:infra
        - area:agent
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:P0
        - priority:P1
        - priority:P2
        - priority:P3
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - sprint:0
        - sprint:1
        - sprint:2
        - sprint:3
        - "(backlog — no sprint label)"

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Set up GitHub Actions lint + test on PR...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
