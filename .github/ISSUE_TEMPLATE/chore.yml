name: Chore
description: Tooling, docs, setup, CI, or time-boxed research
title: "[area] "
labels: ["type:chore"]
body:
  - type: markdown
    attributes:
      value: |
        Non-feature work: CI, deps, docs, repo setup, or short research to unblock a decision.
        Branch: `chore/<issue#>-<slug>`
        Conventions: [docs/GITHUB_CONVENTIONS.md](https://github.com/YOUR_ORG/YOUR_REPO/blob/main/docs/GITHUB_CONVENTIONS.md)

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:frontend
        - area:backend
        - area:ml
        - area:infra
        - area:agent
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:P0
        - priority:P1
        - priority:P2
        - priority:P3
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - sprint:0
        - sprint:1
        - sprint:2
        - sprint:3
        - "(backlog — no sprint label)"

  - type: dropdown
    id: assignee_role
    attributes:
      label: Primary owner
      options:
        - Person A (App + Infra)
        - Person B (ML + Data + Agent)
        - Both
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Milestone
      placeholder: Phase 0
    validations:
      required: true

  - type: input
    id: project_md_link
    attributes:
      label: PROJECT.md section link
      placeholder: docs/PROJECT.md#phase-0--setup-34-days
    validations:
      required: true

  - type: input
    id: parent_epic
    attributes:
      label: Parent epic issue (optional)
      placeholder: "e.g. 42"

  - type: input
    id: timebox
    attributes:
      label: Time box (optional)
      description: For research chores — max time to spend
      placeholder: 4 hours

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Set up GitHub Actions lint + test on PR...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
